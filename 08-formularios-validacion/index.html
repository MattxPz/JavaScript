<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro Profesional</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h1>Registro de Usuario</h1>
    
    <form id="registroForm" action="#" method="POST" novalidate>
        
        <div class="input-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez">
        </div>

        <div class="input-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">
        </div>

        <div class="input-group">
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="(09) 0000-0000">
        </div>

        <div class="input-group">
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>

        <div class="input-group">
            <label for="genero">Género:</label>
            <select id="genero" name="genero">
                <option value="">Seleccione una opción</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password">
            <div id="password-strength"></div>
        </div>

        <div class="input-group">
            <label for="confirm_password">Confirmar Contraseña:</label>
            <input type="password" id="confirm_password" name="confirm_password">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terminos" name="terminos">
            <label for="terminos">Acepto los términos y condiciones</label>
        </div>

        <div class="button-group">
            <button type="submit" id="submitBtn">Registrarse</button>
        </div>

    </form>

    <script type="module" src="js/app.js"></script>
</body>
</html>
